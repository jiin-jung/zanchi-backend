# ===== H2 (?? ??) =====
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:app;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 ??(?? ?)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? ??
server.port=8080

# JWT
jwt.secret=test-secret-key-for-hs256-must-be-32-bytes

# External integrations
S3_BUCKET=test-bucket
AWS_REGION=ap-northeast-2
PERSONALIZE_ITEMS_DATASET_ARN=arn:aws:personalize:ap-northeast-2:000000000000:dataset/test/ITEMS
app.s3.bucket=test-bucket
app.maps.kakao.host=https://dapi.kakao.com
app.maps.kakao.rest-api-key=test-kakao-key
app.maps.google.api-key=test-google-key
spring.ai.openai.api-key=test-openai-key

# (??) Redis ???? ???? ? EC2? Redis? ?? ? ????
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# ?? ??? ??(?? ? ??)
app.upload.dir=${user.home}/fitlog/uploads/clips
app.upload.root=${user.home}/fitlog/uploads
app.upload.avatar-dir=${user.home}/fitlog/uploads/avatars
spring.servlet.multipart.location=${user.home}/fitlog/tmp
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
